{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% block meta %}
  <meta name="description" content="{{ page_description|default:'Official website of NIWE' }}">
  <meta name="keywords" content="{{ page_keywords|default:'NIWE, Wind Energy, MNRE, India' }}">
  {% endblock %}
  <meta name="author" content="National Institute of Wind Energy (NIWE)">
  <link rel="icon" href="{% static 'images/title-logo.png' %}" type="image/x-icon">
  <title>{% block title %}NATIONAL INSTITUTE OF WIND ENERGY{% endblock %}</title>
  {% block extrahead %}{% endblock %}
  
  {% include 'header.html' %} <!-- your navigation bar -->

  {% block content %}{% endblock %}

  {% include 'footer.html' %}

</body>
</html>
